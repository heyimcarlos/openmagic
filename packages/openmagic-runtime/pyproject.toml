[project]
name = "openmagic-runtime"
version = "0.1.0"
description = "Reusable durable workflow runtime for OpenMagic"
requires-python = ">=3.11,<3.15"
dependencies = ["psycopg[binary]>=3.3.0,<4.0.0"]

[project.scripts]
openmagic-workflow-worker = "openmagic_runtime.workers:workflow_worker_main"
openmagic-delivery-worker = "openmagic_runtime.workers:delivery_worker_main"

[project.entry-points."openmagic.migrations"]
openmagic_runtime = "openmagic_runtime._persistence:bundle"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openmagic_runtime"]

[tool.hatch.build]
include = ["src/openmagic_runtime/**/*.py", "src/openmagic_runtime/**/*.sql"]
