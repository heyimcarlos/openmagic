[tool.uv]
package = false

[tool.uv.workspace]
members = [
    "packages/openmagic-runtime",
    "reference-apps/example-insurance",
    "apps/api",
    "evals",
]

[tool.uv.sources]
openmagic-runtime = { workspace = true }
example-insurance = { workspace = true }
openmagic-api = { workspace = true }
openmagic-evals = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=9.0.0,<10.0.0",
    "pytest-timeout>=2.4.0,<3.0.0",
    "ruff>=0.15.0,<0.16.0",
    "ty>=0.0.54,<1.0.0",
]

[tool.pytest.ini_options]
testpaths = [
    "packages/openmagic-runtime/tests",
    "reference-apps/example-insurance/tests",
    "apps/api/tests",
    "evals/tests",
]
timeout = 90
addopts = ["--strict-markers"]
markers = [
    "integration: requires real PostgreSQL and operating-system processes",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["ASYNC", "B", "C4", "E", "F", "I", "PT", "RUF", "SIM", "UP", "W"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S101"]
