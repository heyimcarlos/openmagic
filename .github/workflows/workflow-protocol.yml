name: Workflow protocol

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-protocol-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: openmagic
          POSTGRES_PASSWORD: openmagic
          POSTGRES_DB: openmagic
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U openmagic -d openmagic"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      OPENMAGIC_DATABASE_URL: postgresql+psycopg://openmagic:openmagic@127.0.0.1:5432/openmagic
      OPENMAGIC_TEST_DATABASE_URL: postgresql+psycopg://openmagic:openmagic@127.0.0.1:5432/openmagic

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Check formatting
        run: >-
          uv run ruff format --check
          server/workflows
          server/agents/interaction_agent
          server/agents/execution_agent/batch_manager.py
          server/services/conversation/chat_handler.py
          server/services/gmail/importance_watcher.py
          server/services/trigger_scheduler.py
          server/scripts
          server/config.py
          server/tests
          server/migrations
      - name: Lint
        run: >-
          uv run ruff check
          server/workflows
          server/agents/interaction_agent
          server/agents/execution_agent/batch_manager.py
          server/services/conversation/chat_handler.py
          server/services/gmail/importance_watcher.py
          server/services/trigger_scheduler.py
          server/scripts
          server/config.py
          server/tests
          server/migrations
      - name: Type check
        run: >-
          uv run ty check
          server/workflows
          server/agents/interaction_agent
          server/agents/execution_agent/batch_manager.py
          server/services/conversation/chat_handler.py
          server/services/gmail/importance_watcher.py
          server/services/trigger_scheduler.py
          server/scripts
          server/config.py
      - name: Apply and verify migrations
        run: |
          uv run alembic upgrade head
          uv run alembic check
      - name: Run Workflow integration tests
        run: uv run pytest
