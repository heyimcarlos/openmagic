name: Runtime reference baseline

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runtime-foundation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true
          python-version: "3.13"
      - run: uv sync --all-packages --locked --group dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run ty check packages/openmagic-runtime/src reference-apps/example-insurance/src apps/api/src evals/src apps/playground/src
      - run: uv run ty check packages/openmagic-runtime/tests reference-apps/example-insurance/tests apps/playground/tests evals/tests
      - run: uv run pytest
      - run: uv run pytest evals/tests/test_foundation_wheels.py
